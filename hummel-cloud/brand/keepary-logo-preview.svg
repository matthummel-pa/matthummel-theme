<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" width="680" height="320" role="img" aria-label="Keepary logo preview">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="680" height="320" fill="#f6f7fb"/>

  <!-- big icon -->
  <rect x="48" y="60" width="120" height="120" rx="30" fill="url(#g)"/>
  <g fill="none" stroke="#fff" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" transform="translate(48,60)">
    <path d="M45 36 V84"/><path d="M45 61 L80 36"/><path d="M45 61 L82 85"/>
  </g>

  <!-- medium -->
  <rect x="200" y="100" width="64" height="64" rx="16" fill="url(#g)"/>
  <g fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" transform="translate(200,100) scale(0.533)">
    <path d="M45 36 V84"/><path d="M45 61 L80 36"/><path d="M45 61 L82 85"/>
  </g>

  <!-- small / favicon -->
  <rect x="290" y="116" width="32" height="32" rx="8" fill="url(#g)"/>
  <g fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" transform="translate(290,116) scale(0.266)">
    <path d="M45 36 V84"/><path d="M45 61 L80 36"/><path d="M45 61 L82 85"/>
  </g>

  <!-- wordmark -->
  <text x="360" y="135" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="42" font-weight="800" fill="#1e2235" letter-spacing="-1">Keepary</text>
  <text x="362" y="160" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="15" font-weight="600" fill="#6b7287">Your documents, kept safe</text>

  <!-- header bar mockup -->
  <rect x="48" y="232" width="584" height="56" rx="14" fill="url(#g)"/>
  <rect x="64" y="246" width="28" height="28" rx="8" fill="#ffffff" opacity="0.2"/>
  <g fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" transform="translate(64,246) scale(0.233)">
    <path d="M45 36 V84"/><path d="M45 61 L80 36"/><path d="M45 61 L82 85"/>
  </g>
  <text x="102" y="266" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="17" font-weight="800" fill="#ffffff">Keepary</text>
</svg>
