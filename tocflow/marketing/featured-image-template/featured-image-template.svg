<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- ============================================================
       MATT HUMMEL — STANDARD FEATURED-IMAGE TEMPLATE  (1200 x 630)
       Reuse this layout for every project. Swap the two gradient
       stop colors + accent colors for the PROJECT's own brand.
       Replace: BRAND_DARK, BRAND_MID, BRAND_LIGHT, ACCENT_TEXT,
       LOGO/ICON, WORDMARK, TAGLINE, PILL, HEADLINE, SUBLINE, CARD.
       ============================================================ -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"    stop-color="#22503a"/>   <!-- BRAND_DARK  -->
      <stop offset="0.55" stop-color="#2f6f4e"/>   <!-- BRAND_MID   -->
      <stop offset="1"    stop-color="#3f936a"/>   <!-- BRAND_LIGHT -->
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#0c2a1d" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- LOGO LOCKUP: white rounded tile (112x112 @ 80,74) + project icon -->
  <rect x="80" y="74" width="112" height="112" rx="26" fill="#ffffff"/>
  <!-- <<< project icon goes here, in BRAND_MID color >>> -->

  <!-- WORDMARK + TAGLINE (white / light accent) -->
  <text x="214" y="138" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="800" letter-spacing="-1.5" fill="#ffffff">Project Name</text>
  <text x="216" y="170" font-family="Arial, Helvetica, sans-serif" font-size="16" letter-spacing="3" fill="#cfe6da">PROJECT TAGLINE / CATEGORY</text>

  <!-- EYEBROW PILL -->
  <rect x="80" y="230" width="210" height="44" rx="22" fill="rgba(255,255,255,0.16)" stroke="rgba(255,255,255,0.35)"/>
  <text x="104" y="259" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" letter-spacing="2" fill="#eafff4">PROJECT TYPE</text>

  <!-- HEADLINE (two lines: white + light accent) -->
  <text x="80" y="350" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#ffffff">Headline line one</text>
  <text x="80" y="404" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#cfe6da">headline line two</text>
  <text x="82" y="462" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="500" letter-spacing="1" fill="#aedcc4">Feature &#183; Feature &#183; Feature &#183; Feature</text>

  <!-- PREVIEW CARD (white, right side ~800,210 320x300) -->
  <g filter="url(#sh)"><rect x="800" y="210" width="320" height="300" rx="16" fill="#ffffff"/></g>
  <!-- <<< project-specific preview (UI snippet, browser mock, etc.) >>> -->

  <!-- FOOTER URL -->
  <text x="80" y="556" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#eafff4">matthummel.com</text>
</svg>
